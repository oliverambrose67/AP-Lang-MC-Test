          content: `[Line 1] Most people measure their happiness in terms of physical pleasure and material possession. Could they win some visible goal which they have set on the horizon, how happy they would be! Lacking this gift or that circumstance, they would be miserable. [Line 5] If happiness is to be so measured, I who cannot hear or see have every reason to sit in a corner with folded hands and weep. If I am happy in spite of my deprivations, if my happiness is so deep that it is a faith, [Line 10] so thoughtful that it becomes a philosophy of life,—if, in short, I am an optimist, my testimony to the creed of optimism is worth hearing. As sinners stand up in meeting and testify to the goodness of God, so one who is called afflicted may rise up in gladness of conviction [Line 15] and testify to the goodness of life. Once I knew the depth where no hope was, and darkness lay on the face of all things. Then love came and set my soul free.

        { id: 20, passageId: 2, text: "When the writer says, “But I ask…will help” (lines 57–60), he is using which of the following approaches to persuade his audience?", options: [{ id: "A", text: "Reasoning and logic" }, { id: "B", text: "Emotion and personal character" }, { id: "C", text: "Facts and figures" }, { id: "D", text: "Moral and ethical claims" }, { id: "E", text: "Analysis and inference" }], correct: "B" },

        { id: 24, passageId: 3, text: "In sentence 4, which of the following versions of the underlined text most effectively transitions the reader from the introduction to the main argument of the passage?", options: [{ id: "A", text: "Many U.S. communities have implemented recycling initiatives... including curbside pickup, current recycling systems that utilize single-stream recycling and global changes..." }, { id: "B", text: "curbside pickup; however, current recycling systems that utilize single-stream recycling" }, { id: "C", text: "curbside pickup and current recycling systems that utilize single-stream recycling" }, { id: "D", text: "curbside pickup together with current recycling systems that utilize single-stream recycling" }, { id: "E", text: "curbside pickup, as opposed to current recycling systems that utilize single-stream recycling" }], correct: "B" },
        { id: 25, passageId: 3, text: "In sentence 10, which version of the underlined text best maintains the writer’s tone?", options: [{ id: "A", text: "giving both the milk carton and the boxes a one-way ticket to the garbage dump." }, { id: "B", text: "marking both the milk carton and the boxes as disposable junk" }, { id: "C", text: "causing both the milk carton and the boxes to be disposed of as waste" }, { id: "D", text: "so you might as well chuck both the milk carton and the boxes into the dumpster" }, { id: "E", text: "which means you’ve effectively turned your boxes and milk cartons into trash" }], correct: "C" },
        { id: 26, passageId: 3, text: "The writer wants to add the following sentence to the second paragraph to introduce a counterclaim. 'Proponents of single-stream recycling argue that while there is an increased risk of contamination, this risk is offset by the increased number of items being recycled.' Where would the sentence best be placed?", options: [{ id: "A", text: "Before sentence 5" }, { id: "B", text: "After sentence 6" }, { id: "C", text: "After sentence 7" }, { id: "D", text: "After sentence 9" }, { id: "E", text: "After sentence 10" }], correct: "C" },
        { id: 27, passageId: 3, text: "In sentence 11, the writer wants to provide a link between the main argument and the development of ideas within the paragraph. Which of the following versions of the underlined text best achieves this purpose?", options: [{ id: "A", text: "To further compound the issue, the cost of recycling is on the rise." }, { id: "B", text: "Further complicating the process of recycling is that" }, { id: "C", text: "As if contamination wasn’t a big enough problem," }, { id: "D", text: "Recycling is made more ineffective by the fact that" }, { id: "E", text: "Many recycling companies must contend with the reality that" }], correct: "B" },
        { id: 28, passageId: 3, text: "The writer wants to add the following sentence to the third paragraph to provide a piece of evidence. 'One New Hampshire-based waste management company saw its recycling costs increase from $6.00 per ton to over $100.00 per ton in a matter of months.' Where would the sentence best be placed?", options: [{ id: "A", text: "Before sentence 11" }, { id: "B", text: "After sentence 11" }, { id: "C", text: "After sentence 12" }, { id: "D", text: "After sentence 13" }, { id: "E", text: "After sentence 14" }], correct: "B" },
        { id: 29, passageId: 3, text: "The writer wants to clarify the information in sentence 16 by changing the underlined text, adjusting the punctuation, and capitalizing as needed. Which of the following versions of the underlined text best achieves this goal?", options: [{ id: "A", text: "To put this cap in perspective, it is important to note that U.S. paper products have a 25 percent food contamination rate." }, { id: "B", text: "U.S. paper products have, it is important to note, a food contamination rate of 25 percent." }, { id: "C", text: "Americans need to understand that U.S. paper products are highly contaminated with food." }, { id: "D", text: "25 percent of all U.S. paper products placed in a recycling bin are marred by food waste or residue." }, { id: "E", text: "you should know that nearly a quarter of U.S. paper products cannot be recycled due to food contamination." }], correct: "D" },
        { id: 30, passageId: 3, text: "Which of the following sentences, if placed after sentence 17, would provide the most effective conclusion to the main argument of the passage?", options: [{ id: "A", text: "Because U.S. waste management companies cannot afford to process recycling in-house, most materials collected through recycling will be deposited in landfills." }, { id: "B", text: "As doors continue to close on recycling, both in collection and processing, waste disposal companies must consider more effective solutions to the problem of trash." }, { id: "C", text: "Some waste management groups report that because of the increase in recycling costs, it is cheaper to burn or dump items collected for recycling." }, { id: "D", text: "One solution to the issue of recycling is for waste management companies to better educate consumers on the importance of sorting recyclables before disposing." }, { id: "E", text: "Americans should act to eliminate waste on an individual level by using reusable containers and bottles, limiting the consumption of paper products, and buying items in bulk." }], correct: "B" },
        { id: 31, passageId: 4, text: "Which of the following sentences could the writer add before sentence 1 to most provide the most effective introduction to the passage?", options: [{ id: "A", text: "While the history of musical expression is often debated, most historians and musicians agree that New Orleans is the birthplace of American jazz music." }, { id: "B", text: "Recognized as an inherently American art form, jazz music has roots in African American traditions dating before the Civil War." }, { id: "C", text: "From Mardi Gras parades to beignets in the French Quarter, New Orleans is a city that is rich in both diversity and character." }, { id: "D", text: "While the blues gave voice to the oppression and despair of segregation, jazz explored the effervescent possibility of freedom." }, { id: "E", text: "American jazz was popularized in 1917, when the Original Dixieland Jazz Band recorded the first jazz record." }], correct: "A" },
        { id: 32, passageId: 4, text: "The writer intends for the text to be read by students in an introductory music class. Which sentence, when added after sentence 1, would most effectively aid a student’s understanding?", options: [{ id: "A", text: "Jazz is a form of modern American music that was created by African American musicians and is characterized by unique rhythms and improvisation." }, { id: "B", text: "A lone trumpet calls out in the night, its syncopated notes echoed by a trombone that is soon joined by bass and a piano." }, { id: "C", text: "From football to fast food, there are things that are quintessentially American; but perhaps none so much as jazz music." }, { id: "D", text: "New Orleans developed along the Mississippi River as a trading port for French fur trappers and was later home to major shipping industries." }, { id: "E", text: "The Mississippi River is the lifeblood of New Orleans, ferrying goods and people over the years to build a one-of-a-kind city." }], correct: "A" },
        { id: 33, passageId: 4, text: "In sentence 2, the writer is considering deleting the underlined text. 'Ragtime, blues, marches, string orchestras, and brass bands collided in a kaleidoscope of syncopated rhythm and complex harmony.' Should the writer keep or delete the underlined text?", options: [{ id: "A", text: "Keep it because it provides a description of the diverse “cultural and social fabric” that enabled the creation of jazz." }, { id: "B", text: "Keep it because it supports the audience’s perspective that New Orleans is a colorful city." }, { id: "C", text: "Keep it because it provides a contrast to how American music changed throughout the twentieth century." }, { id: "D", text: "Delete it because it changes the tone of the sentence from being philosophical to absurd." }, { id: "E", text: "Delete it because it introduces a counterclaim before the main argument is presented." }], correct: "A" },
        { id: 34, passageId: 4, text: "The writer wants to modify sentence 3 to introduce an argument that can be supported by the evidence within the paragraph. 'New Orleans was a city that embraced dancing, and many early jazz musicians developed their skills providing music at dance halls and social festivals.' Which of the following versions of the underlined text best accomplishes this goal?", options: [{ id: "A", text: "(as it is now)" }, { id: "B", text: "jazz musicians were eager to provide music that kept people dancing at both dance halls and social festivals" }, { id: "C", text: "people there were eager to explore new forms of dancing that were accompanied by new musical forms" }, { id: "D", text: "dance halls and social festivals provided a space to indulge in the freedom of dancing" }, { id: "E", text: "the festive culture of the city precipitated a change in the function of music that found expression in early jazz songs" }], correct: "A" },
        { id: 35, passageId: 4, text: "The writer wants to add more information after sentence 6 to support the main argument. All of the following pieces of evidence help achieve this purpose EXCEPT which one?", options: [{ id: "A", text: "A biographical sketch of early jazz musicians in New Orleans that chronicles how their careers developed" }, { id: "B", text: "An article published on a university website that describes the music scene in New Orleans in the early twentieth century" }, { id: "C", text: "A blog post on a Louisiana tourism website that highlights popular New Orleans music clubs" }, { id: "D", text: "A transcript of an interview with an early jazz pioneer about experimenting with style while playing in New Orleans" }, { id: "E", text: "A documentary film tracing the evolution of jazz music from its early days in New Orleans to contemporary jazz greats" }], correct: "C" },
        { id: 36, passageId: 4, text: "The writer wants to add the following sentence to paragraph 4 to more effectively explain the relationship between jazz form and New Orleans. 'Jazz, in its purest form, is ungovernable by the rules of traditional music, focusing on improvisation and syncopation rather than structured notes and beats.' Where would the sentence be most effective?", options: [{ id: "A", text: "Before sentence 6" }, { id: "B", text: "After sentence 6" }, { id: "C", text: "After sentence 7" }, { id: "D", text: "After sentence 8" }, { id: "E", text: "The sentence would not be effective in the paragraph." }], correct: "C" },
        { id: 37, passageId: 4, text: "The writer is considering modifying sentence 10 to eliminate the underlined parenthetical phrase. 'The collaborative nature of jazz music, with many different instruments playing improvisations as one, represented the diversity inherent in New Orleans culture.' Should the writer eliminate the underlined text?", options: [{ id: "A", text: "Yes, because it interrupts the argument that jazz collaborations represent New Orleans culture." }, { id: "B", text: "Yes, because it is an unnecessary detail that does not add meaning to the sentence." }, { id: "C", text: "Yes, because it inappropriately shifts from past tense to present perfect tense." }, { id: "D", text: "No, because it provides a description of improvisation that might aid understanding." }, { id: "E", text: "No, because it is an interesting detail that some readers might enjoy learning." }], correct: "D" },
        { id: 38, passageId: 4, text: "In sentence 11, the writer wants to more effectively illustrate the uniqueness of New Orleans in regard to population demographics. 'While New Orleans was a Southern city, it was extremely multicultural in makeup.' Which version of the underlined text best accomplishes this goal?", options: [{ id: "A", text: "(as it is now)" }, { id: "B", text: "part of the segregated South, its citizens were ethnically diverse" }, { id: "C", text: "a very Southern city, its population was more multicultural" }, { id: "D", text: "a Southern city geographically, many citizens came from the North" }, { id: "E", text: "in the South, the musical influences came from across the globe" }], correct: "B" },
        { id: 39, passageId: 5, text: "In sentence 1, the writer is considering deleting the underlined text. 'Gabriela Sosa sits with a group of elementary aged students under the shade of a banana tree in rural Honduras.' Should the writer keep or delete the underlined text?", options: [{ id: "A", text: "Keep it because it establishes context and provides a description that clarifies the purpose of a gap year." }, { id: "B", text: "Keep it because it helps audiences in developing nations see that an education is possible." }, { id: "C", text: "Keep it because it establishes an uplifting and optimistic tone that will appeal to readers." }, { id: "D", text: "Delete it because it is contrary to the writer’s purpose and detracts from the main argument." }, { id: "E", text: "Delete it because there is no supporting evidence to defend the claim suggested in the sentence." }], correct: "A" },
        { id: 40, passageId: 5, text: "In sentence 4, which version of the underlined text best clarifies the writer’s purpose? 'The concept is gaining popularity and can be beneficial for students if implemented correctly.'", options: [{ id: "A", text: "(as it is now)" }, { id: "B", text: "but is not useful for students who want to graduate with honors" }, { id: "C", text: "yet teaches irresponsibility and self-centered behavior" }, { id: "D", text: "even though it has been in existence since the 1800s" }, { id: "E", text: "as students around the United States seek alternatives to college" }], correct: "A" },
        { id: 41, passageId: 5, text: "The writer wants to revise the underlined text in sentence 5 to more effectively emphasize the main argument. 'Motivation is the key when considering the pros of a gap year.' Which change best achieves this goal?", options: [{ id: "A", text: "implications" }, { id: "B", text: "drawbacks" }, { id: "C", text: "appeal" }, { id: "D", text: "efficacy" }, { id: "E", text: "criticisms" }], correct: "D" },
        { id: 42, passageId: 5, text: "The writer wants to add the following quote to the second paragraph (sentences 5–8) to build support for the main argument. 'Almost anything can make a gap year rewarding, say experts, so long as the time is well planned' Where would this quote be most effective?", options: [{ id: "A", text: "Before sentence 5" }, { id: "B", text: "After sentence 5" }, { id: "C", text: "After sentence 6" }, { id: "D", text: "After sentence 7" }, { id: "E", text: "After sentence 8" }], correct: "C" },
        { id: 43, passageId: 5, text: "The writer wants to add a word or phrase at the beginning of sentence 11, adjusting the capitalization as needed, to more effectively connect the ideas in sentence 11 to sentence 10. 'A gap year provides the opportunity for students to explore career options and ultimately find a degree program that meets their career goals.' Which of the following words or phrases best accomplishes this goal?", options: [{ id: "A", text: "For example," }, { id: "B", text: "Instead," }, { id: "C", text: "Likewise," }, { id: "D", text: "In addition," }, { id: "E", text: "Also," }], correct: "B" },
        { id: 44, passageId: 5, text: "The writer wants to make a comparison in the third paragraph (sentences 9–11) to aid the reader’s understanding of the main argument. Which comparison would most effectively achieve this goal?", options: [{ id: "A", text: "Similar to newborn puppies, many high school graduates are completely dependent on the adults in their lives." }, { id: "B", text: "College is a journey and, as with any journey, one must make preparations in advance." }, { id: "C", text: "Like the protagonist in a coming-of-age novel, students emerge from a gap year with new insight into life and self." }, { id: "D", text: "Many students graduate from high school with a limited understanding of who they are and what they want from life." }, { id: "E", text: "Students should be careful, however, as it is possible to waste the opportunity of a gap year by acting like it’s a long vacation." }], correct: "C" },
        { id: 45, passageId: 5, text: "In the fourth paragraph (sentences 12–13), the writer wants to expand on the claim that a gap year is not for every student. Which of the following pieces of evidence would best achieve this goal?", options: [{ id: "A", text: "Some students note that it can be difficult to return to school and find that your peers have moved on in their educational pursuits, while you are a year behind." }, { id: "B", text: "Although, almost 90 percent of students who take a gap year attest to its educational benefits." }, { id: "C", text: "There are some students who just do not have the self-discipline to use the gap year appropriately." }, { id: "D", text: "Many top-ranking colleges and universities support the idea of a gap year for students and assist them in making the most of it." }, { id: "E", text: "Students should talk to a college advisor before determining whether or not to take a gap year." }], correct: "A" }
      ]
    };

    // --- STATE ---
    let hasStarted = false;
    let isSubmitted = false;
    let currentQIndex = 0;
    let timeLeft = 5400; // 90 minutes
    let answers = {};
    let eliminatedOptions = {};
    let timerInterval = null;

    // --- LOGIC ---
    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    window.startTest = function() {
      hasStarted = true;
      render();
      
      timerInterval = setInterval(() => {
        if (timeLeft <= 1) {
          clearInterval(timerInterval);
          isSubmitted = true;
          timeLeft = 0;
          render();
        } else {
          timeLeft--;
          const timerDisplay = document.getElementById('timer-display');
          if(timerDisplay) {
            timerDisplay.innerText = formatTime(timeLeft);
            if(timeLeft < 300) {
              timerDisplay.classList.add('text-red-400', 'animate-pulse');
            }
          }
        }
      }, 1000);
    }

    window.submitTest = function() {
      if (confirm("Are you sure you want to submit your test?")) {
        isSubmitted = true;
        clearInterval(timerInterval);
        render();
      }
    }

    window.selectAnswer = function(qId, optId) {
      answers[qId] = optId;
      render();
    }

    window.toggleEliminate = function(event, qId, optId) {
      event.stopPropagation();
      if (!eliminatedOptions[qId]) eliminatedOptions[qId] = [];
      
      const idx = eliminatedOptions[qId].indexOf(optId);
      if (idx > -1) {
        eliminatedOptions[qId].splice(idx, 1);
      } else {
        eliminatedOptions[qId].push(optId);
      }
      render();
    }

    window.goToQuestion = function(idx) {
      currentQIndex = idx;
      render();
    }

    // --- RENDERERS ---
    function renderStartScreen() {
      return `
        <div class="flex flex-col items-center justify-center min-h-screen bg-gray-50 p-6">
          <div class="max-w-2xl bg-white p-8 rounded-lg shadow-lg text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">AP® English Language and Composition</h1>
            <h2 class="text-xl text-gray-600 mb-6">Interactive Practice Test 1</h2>
            <div class="bg-blue-50 text-blue-800 p-4 rounded text-left mb-8 text-sm">
              <h3 class="font-semibold text-lg flex items-center mb-2">
                ${icons.alertCircle} Testing Accommodations Enabled
              </h3>
              <ul class="list-disc pl-5 space-y-2">
                <li><strong>Timer:</strong> Time + 50% applied. You have 90 minutes to complete ${testData.questions.length} questions.</li>
                <li><strong>Elimination Tool:</strong> Click the <span class="inline-block align-middle w-4 h-4 mx-1">${icons.eyeOff}</span> icon next to any option to visually cross it out.</li>
                <li><strong>Withheld Results:</strong> Correct answers and rationale will only be shown after you submit your exam.</li>
              </ul>
            </div>
            <button onclick="startTest()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition transform hover:scale-105">
              Start Exam
            </button>
          </div>
        </div>
      `;
    }

    function renderResultsScreen() {
      let score = 0;
      let questionsHtml = '';

      testData.questions.forEach((q, i) => {
        const isCorrect = answers[q.id] === q.correct;
        const isUnanswered = !answers[q.id];
        if (isCorrect) score++;

        let borderClass = isCorrect ? 'border-green-500 bg-green-50' : (isUnanswered ? 'border-yellow-500 bg-yellow-50' : 'border-red-500 bg-red-50');

        let optionsHtml = '';
        q.options.forEach(opt => {
          const isChosen = answers[q.id] === opt.id;
          const isActualCorrect = q.correct === opt.id;
          
          let optClass = "p-2 rounded ";
          let iconHtml = "";

          if (isActualCorrect) {
            optClass += "bg-green-200 font-semibold text-green-900 border border-green-400";
            if (isChosen) iconHtml = `<span class="inline-block ml-2 text-green-700 align-middle">${icons.checkCircle}</span>`;
          } else if (isChosen && !isActualCorrect) {
            optClass += "bg-red-200 text-red-900 border border-red-400 line-through";
            iconHtml = `<span class="inline-block ml-2 text-red-700 align-middle">${icons.xCircle}</span>`;
          } else {
            optClass += "text-gray-600";
          }

          optionsHtml += `
            <div class="${optClass}">
              ${opt.id}. ${opt.text} ${iconHtml}
            </div>
          `;
        });

        questionsHtml += `
          <div class="p-4 rounded-lg border-l-4 ${borderClass}">
            <h3 class="font-semibold text-gray-800 mb-2">
              <span class="mr-2">${i + 1}.</span> ${q.text}
            </h3>
            <div class="ml-6 space-y-2 text-sm">
              ${optionsHtml}
            </div>
          </div>
        `;
      });

      const percentage = Math.round((score / testData.questions.length) * 100);

      return `
        <div class="flex flex-col h-screen overflow-y-auto p-6">
          <div class="max-w-4xl mx-auto w-full bg-white shadow-lg rounded-lg p-8">
            <div class="text-center mb-8 border-b pb-6">
              <h1 class="text-3xl font-bold text-gray-800">Exam Results</h1>
              <p class="text-2xl mt-4">
                Your Score: <span class="font-bold text-blue-600">${score}</span> / ${testData.questions.length}
              </p>
              <p class="text-gray-500 mt-2">(${percentage}%)</p>
            </div>
            <div class="space-y-8">
              ${questionsHtml}
            </div>
          </div>
        </div>
      `;
    }

    function renderTestScreen() {
      const currentQuestion = testData.questions[currentQIndex];
      const currentPassage = testData.passages.find(p => p.id === currentQuestion.passageId);
      const qElim = eliminatedOptions[currentQuestion.id] || [];

      // Build options
      let optionsHtml = '';
      currentQuestion.options.forEach(opt => {
        const isEliminated = qElim.includes(opt.id);
        const isSelected = answers[currentQuestion.id] === opt.id;
        
        let containerClass = "flex items-center justify-between p-4 border rounded-lg cursor-pointer transition-all ";
        if (isEliminated) containerClass += "bg-gray-100 border-gray-200 opacity-60";
        else if (isSelected) containerClass += "border-blue-500 bg-blue-50 ring-1 ring-blue-500";
        else containerClass += "bg-white border-gray-300 hover:border-blue-300 hover:shadow-sm";

        let textClass = isEliminated ? "line-through text-gray-500" : "text-gray-800";
        let radioClass = isSelected ? "border-blue-600" : "border-gray-400";
        let dotHtml = isSelected ? '<div class="w-3 h-3 rounded-full bg-blue-600"></div>' : '';
        
        let buttonClass = `ml-4 p-2 rounded-full hover:bg-gray-200 transition ${isEliminated ? 'text-red-500' : 'text-gray-400 hover:text-gray-700'}`;
        let buttonTitle = isEliminated ? "Restore Option" : "Cross Out Option";

        optionsHtml += `
          <div onclick="${isEliminated ? '' : `selectAnswer(${currentQuestion.id}, '${opt.id}')`}" class="${containerClass}">
            <div class="flex items-center space-x-4 flex-1">
              <div class="w-5 h-5 rounded-full border flex flex-shrink-0 items-center justify-center ${radioClass}">
                ${dotHtml}
              </div>
              <div class="text-sm md:text-base ${textClass}">
                <span class="font-bold mr-2">${opt.id}.</span> ${opt.text}
              </div>
            </div>
            <button onclick="toggleEliminate(event, ${currentQuestion.id}, '${opt.id}')" class="${buttonClass}" title="${buttonTitle}">
              ${icons.eyeOff}
            </button>
          </div>
        `;
      });

      // Build Nav bubbles
      let navHtml = '';
      testData.questions.forEach((q, idx) => {
        let btnClass = "flex-shrink-0 w-8 h-8 rounded-full text-xs font-bold border transition ";
        if (currentQIndex === idx) btnClass += "bg-blue-600 text-white border-blue-600";
        else if (answers[q.id]) btnClass += "bg-blue-100 text-blue-800 border-blue-300";
        else btnClass += "bg-white text-gray-600 hover:bg-gray-200";

        navHtml += `<button onclick="goToQuestion(${idx})" class="${btnClass}">${idx + 1}</button>`;
      });

      const prevDisabled = currentQIndex === 0 ? 'disabled' : '';
      const nextDisabled = currentQIndex === testData.questions.length - 1 ? 'disabled' : '';

      return `
        <div class="flex flex-col h-screen">
          <!-- Top Nav -->
          <div class="bg-blue-900 text-white shadow-md flex justify-between items-center px-6 py-3">
            <div class="font-bold text-lg hidden sm:block">AP® English Language and Composition</div>
            <div class="flex items-center space-x-2 bg-blue-800 px-4 py-1 rounded-full border border-blue-700">
              ${icons.clock}
              <span id="timer-display" class="font-mono text-lg ${timeLeft < 300 ? 'text-red-400 animate-pulse' : ''}">${formatTime(timeLeft)}</span>
            </div>
            <button onclick="submitTest()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded font-semibold text-sm transition shadow">
              Submit Test
            </button>
          </div>

          <!-- Split Interface -->
          <div class="flex-1 flex overflow-hidden">
            <!-- Left Pane -->
            <div class="w-1/2 p-6 overflow-y-auto border-r border-gray-300 bg-white">
              <h2 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2 sticky top-0 bg-white z-10">${currentPassage.title}</h2>
              <div class="text-gray-700 leading-relaxed font-serif text-[15px] space-y-4 whitespace-pre-wrap">${currentPassage.content}</div>
            </div>

            <!-- Right Pane -->
            <div class="w-1/2 flex flex-col bg-gray-50 relative">
              <!-- Pagination -->
              <div class="bg-white border-b px-4 py-2 flex items-center justify-between shadow-sm z-10">
                <button onclick="goToQuestion(${Math.max(0, currentQIndex - 1)})" ${prevDisabled} class="p-2 text-gray-500 hover:bg-gray-100 rounded disabled:opacity-30">
                  ${icons.chevronLeft}
                </button>
                <div class="flex space-x-1 overflow-x-auto px-2 mx-2 custom-scrollbar">
                  ${navHtml}
                </div>
                <button onclick="goToQuestion(${Math.min(testData.questions.length - 1, currentQIndex + 1)})" ${nextDisabled} class="p-2 text-gray-500 hover:bg-gray-100 rounded disabled:opacity-30">
                  ${icons.chevronRight}
                </button>
              </div>

              <!-- Question Content -->
              <div class="flex-1 overflow-y-auto p-8">
                <div class="mb-6">
                  <span class="bg-gray-200 text-gray-700 px-3 py-1 rounded text-xs font-bold uppercase tracking-wider mb-3 inline-block">
                    Question ${currentQIndex + 1} of ${testData.questions.length}
                  </span>
                  <h3 class="text-lg font-medium text-gray-900 leading-snug">
                    ${currentQuestion.text}
                  </h3>
                </div>
                <div class="space-y-3">
                  ${optionsHtml}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // --- MAIN RENDER ---
    function render() {
      const app = document.getElementById('app');
      if (!hasStarted) {
        app.innerHTML = renderStartScreen();
      } else if (isSubmitted) {
        app.innerHTML = renderResultsScreen();
      } else {
        app.innerHTML = renderTestScreen();
        // Keep the scrollbar synced when navigating questions
        const activeNavBtn = document.querySelector('.custom-scrollbar button.bg-blue-600');
        if (activeNavBtn) activeNavBtn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      }
    }

    // Initial load
    render();
  </script>
</body>
</html>
